<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Samuel Adebayo AI engineering technology stack</title>
  <desc id="desc">A clean light technology stack panel showing languages, machine learning, agentic AI, backend systems, data and cloud platforms, and delivery interfaces.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FBFF"/>
      <stop offset="0.52" stop-color="#EEF4FA"/>
      <stop offset="1" stop-color="#F6F8FC"/>
    </linearGradient>

    <radialGradient id="wash" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(940 88) rotate(90) scale(230 380)">
      <stop offset="0" stop-color="#8AA0FF" stop-opacity="0.16"/>
      <stop offset="0.48" stop-color="#72D0BD" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#F8FBFF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="accent" x1="70" y1="124" x2="1130" y2="124" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#72D0BD"/>
      <stop offset="0.34" stop-color="#8AD0FF"/>
      <stop offset="0.68" stop-color="#B7A6FF"/>
      <stop offset="1" stop-color="#D9BE73"/>
    </linearGradient>

    <linearGradient id="signal" x1="804" y1="72" x2="1096" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#72D0BD"/>
      <stop offset="0.5" stop-color="#9BA9FF"/>
      <stop offset="1" stop-color="#D9BE73"/>
    </linearGradient>

    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#94A3B8" stroke-opacity="0.075" stroke-width="1"/>
    </pattern>

    <filter id="shadow" x="18" y="16" width="1164" height="488" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#64748B" flood-opacity="0.16"/>
    </filter>

    <style>
      .display {
        font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      .mono {
        font-family: ui-monospace, "SFMono-Regular", "Cascadia Code", "Segoe UI Mono", "Roboto Mono", "JetBrains Mono", "IBM Plex Mono", Consolas, "Liberation Mono", monospace;
      }

      .title {
        fill: #0F172A;
        font-size: 27px;
        font-weight: 740;
      }

      .subtitle {
        fill: #475569;
        font-size: 13.2px;
        font-weight: 520;
      }

      .flow-label {
        fill: #52637A;
        font-size: 9.5px;
        font-weight: 650;
      }

      .card-title {
        fill: #1E293B;
        font-size: 14px;
        font-weight: 720;
      }

      .card-subtitle {
        fill: #64748B;
        font-size: 9.5px;
        font-weight: 540;
      }

      .chip-text {
        fill: #1F2937;
        font-size: 10.5px;
        font-weight: 650;
      }

      .chip-mini {
        fill: #07111F;
        font-size: 6.6px;
        font-weight: 820;
      }

      @media (prefers-reduced-motion: reduce) {
        animate {
          display: none;
        }
      }
    </style>

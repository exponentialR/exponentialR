  </g>

  <g class="display">
    <text class="title" x="72" y="82">AI Engineering Stack</text>
    <text class="subtitle" x="73" y="110">Production ML &#183; agentic systems &#183; cloud platforms &#183; evaluation &#183; applied interfaces</text>
  </g>

  <g class="mono">
    <path d="M804 70H1096" stroke="#CBD5E1" stroke-width="1.4" stroke-linecap="round"/>

<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Samuel Adebayo research hero</title>
  <desc id="desc">A clean visual hero for research across computer vision, dyadic interaction, human-robot collaboration, industrial perception, medical AI, and reliable machine learning.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050C17"/>
      <stop offset="0.55" stop-color="#0B1324"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>

    <radialGradient id="wash" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(915 105) rotate(90) scale(260 420)">
      <stop offset="0" stop-color="#8AA0FF" stop-opacity="0.2"/>
      <stop offset="0.48" stop-color="#72D0BD" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#050C17" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="accent" x1="72" y1="270" x2="590" y2="270" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#72D0BD"/>
      <stop offset="0.38" stop-color="#8AD0FF"/>
      <stop offset="0.7" stop-color="#B7A6FF"/>
      <stop offset="1" stop-color="#D9BE73"/>
    </linearGradient>

    <linearGradient id="route" x1="760" y1="188" x2="1086" y2="188" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#72D0BD"/>
      <stop offset="0.32" stop-color="#8AD0FF"/>
      <stop offset="0.66" stop-color="#B7A6FF"/>
      <stop offset="1" stop-color="#D9BE73"/>
    </linearGradient>

    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#D7E2F0" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>

    <filter id="shadow" x="18" y="18" width="1164" height="324" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.28"/>
    </filter>

    <style>
      .display {
        font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      .mono {
        font-family: ui-monospace, "SFMono-Regular", "Cascadia Code", "Segoe UI Mono", "Roboto Mono", "JetBrains Mono", "IBM Plex Mono", Consolas, "Liberation Mono", monospace;
      }

      .eyebrow {
        fill: #72D0BD;
        font-size: 12px;
        font-weight: 760;
        letter-spacing: 1.8px;
      }

      .title {
        fill: #F8FAFC;
        font-size: 42px;
        font-weight: 780;
      }

      .subtitle {
        fill: #CBD5E1;
        font-size: 17px;
        font-weight: 520;
      }

      .chip-text {
        fill: #DCE6F3;
        font-size: 10px;
        font-weight: 720;
        letter-spacing: 0.4px;
      }

      .node-label {
        fill: #E2E8F0;
        font-size: 10.5px;
        font-weight: 720;
      }

      .node-meta {
        fill: #94A3B8;
        font-size: 9.5px;
        font-weight: 620;
      }

      .icon-line {
        fill: none;
        stroke: #E2E8F0;
        stroke-width: 1.7;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      @media (prefers-reduced-motion: reduce) {
        animate {
          display: none;
        }
      }
    </style>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#grid)"/>
  <rect width="1200" height="360" fill="url(#wash)"/>

  <g filter="url(#shadow)">
    <rect x="48" y="38" width="1104" height="284" rx="24" fill="#101724" fill-opacity="0.74" stroke="#D7E2F0" stroke-opacity="0.12"/>
  </g>

  <g class="display">
    <text class="eyebrow" x="78" y="92">RESEARCH</text>
    <text class="title" x="76" y="128">Human-centred AI, vision,</text>
    <text class="title" x="76" y="172">and reliable ML</text>
    <text class="subtitle" x="78" y="208">Computer vision research for dyadic interaction,</text>
    <text class="subtitle" x="78" y="233">human intention inference, industrial perception, and applied ML.</text>
  </g>

  <g class="mono">
    <path d="M78 252H604" stroke="url(#accent)" stroke-width="2.4" stroke-linecap="round"/>
    <g transform="translate(78 268)">
      <rect width="116" height="28" rx="14" fill="#111D2E" stroke="#72D0BD" stroke-opacity="0.52"/>
      <text class="chip-text" x="18" y="18">COMPUTER VISION</text>
    </g>
    <g transform="translate(204 268)">
      <rect width="138" height="28" rx="14" fill="#111D2E" stroke="#8AD0FF" stroke-opacity="0.52"/>
      <text class="chip-text" x="18" y="18">DYADIC INTERACTION</text>
    </g>
    <g transform="translate(352 268)">
      <rect width="142" height="28" rx="14" fill="#111D2E" stroke="#B7A6FF" stroke-opacity="0.52"/>
      <text class="chip-text" x="18" y="18">POSE ESTIMATION</text>
    </g>
    <g transform="translate(504 268)">
      <rect width="100" height="28" rx="14" fill="#111D2E" stroke="#D9BE73" stroke-opacity="0.52"/>
      <text class="chip-text" x="18" y="18">RELIABLE ML</text>
    </g>
  </g>

  <g class="display" transform="translate(706 78)">
    <text x="0" y="0" fill="#E2E8F0" font-size="13" font-weight="760">Selected research streams</text>
    <text x="0" y="22" fill="#94A3B8" font-size="10.5" font-weight="620">papers, datasets, and tools grouped by theme</text>

    <g transform="translate(0 42)">
      <rect width="398" height="48" rx="14" fill="#0D1626" stroke="#72D0BD" stroke-opacity="0.34"/>
      <circle cx="25" cy="24" r="9" fill="#72D0BD"/>
      <path d="M20.5 24L23.7 27.2L30.5 20.4" stroke="#0D1626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="48" y="21" fill="#F8FAFC" font-size="13" font-weight="760">Dyadic interaction and HRI</text>
      <text x="48" y="37" fill="#94A3B8" font-size="10.2" font-weight="620">QUB-PHEO · Hand-Eye-Object · PhD thesis</text>
    </g>

    <g transform="translate(0 100)">
      <rect width="398" height="48" rx="14" fill="#0D1626" stroke="#8AD0FF" stroke-opacity="0.34"/>
      <circle cx="25" cy="24" r="9" fill="#8AD0FF"/>
      <path d="M17 24C21 18 29 18 33 24C29 30 21 30 17 24Z" fill="none" stroke="#0D1626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="25" cy="24" r="3" fill="#0D1626"/>
      <text x="48" y="21" fill="#F8FAFC" font-size="13" font-weight="760">Gaze and reliable visual perception</text>
      <text x="48" y="37" fill="#94A3B8" font-size="10.2" font-weight="620">SLYKLatent · motion baselines · video tools</text>
    </g>

    <g transform="translate(0 158)">
      <rect width="398" height="48" rx="14" fill="#0D1626" stroke="#B7A6FF" stroke-opacity="0.34"/>
      <circle cx="25" cy="24" r="9" fill="#B7A6FF"/>
      <path d="M19 29V22L25 18L31 22V29M17 29H33" stroke="#0D1626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="48" y="21" fill="#F8FAFC" font-size="13" font-weight="760">Industrial computer vision</text>
      <text x="48" y="37" fill="#94A3B8" font-size="10.2" font-weight="620">ConPose · ISC-Perception · ISARC robotics</text>
    </g>

    <g transform="translate(0 216)">
      <rect width="398" height="48" rx="14" fill="#0D1626" stroke="#D9BE73" stroke-opacity="0.34"/>
      <circle cx="25" cy="24" r="9" fill="#D9BE73"/>
      <path d="M20 26C17 22 20 18 24 20C26 16 31 19 30 23C35 25 33 31 28 30C25 34 19 31 20 26Z" fill="none" stroke="#0D1626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="48" y="21" fill="#F8FAFC" font-size="13" font-weight="760">Medical and applied ML</text>
      <text x="48" y="37" fill="#94A3B8" font-size="10.2" font-weight="620">AlzhiNet · autonomous robotic car</text>
    </g>
  </g>
</svg>

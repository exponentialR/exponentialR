<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Samuel Adebayo - Applied AI Leader and AI Team Lead at ISx4</title>
  <desc id="desc">A clean light profile hero for Samuel Adebayo, presenting applied AI leadership and a small animated AI delivery loop across engineering, agentic systems, evaluation, observability, and deployment.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FBFF"/>
      <stop offset="0.54" stop-color="#EEF4FA"/>
      <stop offset="1" stop-color="#F6F8FC"/>
    </linearGradient>

    <radialGradient id="wash" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(890 118) rotate(90) scale(210 360)">
      <stop offset="0" stop-color="#8AA0FF" stop-opacity="0.16"/>
      <stop offset="0.5" stop-color="#72D0BD" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#F8FBFF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="accent" x1="64" y1="244" x2="620" y2="244" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#72D0BD"/>
      <stop offset="0.54" stop-color="#9BA9FF"/>
      <stop offset="1" stop-color="#D9BE73"/>
    </linearGradient>

    <linearGradient id="loop" x1="778" y1="151" x2="1084" y2="151" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#72D0BD"/>
      <stop offset="0.5" stop-color="#9BA9FF"/>
      <stop offset="1" stop-color="#D9BE73"/>
    </linearGradient>

    <linearGradient id="isx4Core" x1="5" y1="4" x2="29" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#96C85F"/>
      <stop offset="0.55" stop-color="#79B848"/>
      <stop offset="1" stop-color="#5F8F55"/>
    </linearGradient>

    <linearGradient id="isx4Shade" x1="8" y1="3" x2="31" y2="29" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#607B73"/>
      <stop offset="1" stop-color="#355451"/>
    </linearGradient>

    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#64748B" stroke-opacity="0.075" stroke-width="1"/>
    </pattern>

    <filter id="shadow" x="18" y="18" width="1164" height="264" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#64748B" flood-opacity="0.16"/>
    </filter>

    <style>
      .display {
        font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      .mono {
        font-family: ui-monospace, "SFMono-Regular", "Cascadia Code", "Segoe UI Mono", "Roboto Mono", "JetBrains Mono", "IBM Plex Mono", Consolas, "Liberation Mono", monospace;
      }

      .name {
        fill: #0F172A;
        font-size: 40px;
        font-weight: 700;
      }

      .primary {
        fill: #243449;
        font-size: 18px;
        font-weight: 650;
      }

      .org-mark-text {
        fill: #1E293B;
        font-size: 13px;
        font-weight: 720;
        letter-spacing: 0.4px;
      }

      .org-mark-mini {
        fill: #0F766E;
        font-size: 7px;
        font-weight: 780;
        letter-spacing: 0.2px;
      }

      .secondary {
        fill: #475569;
        font-size: 13.2px;
        font-weight: 500;
      }

      .secondary-soft {
        fill: #64748B;
        font-size: 13.2px;
        font-weight: 500;
      }

      .tagline {
        fill: #1F2A44;
        font-size: 15.2px;
        font-weight: 500;
      }

      .capability {
        fill: #55657A;
        font-size: 11.4px;
        font-weight: 560;
      }

      .loop-title {
        fill: #1E293B;
        font-size: 13px;
        font-weight: 680;
      }

      .loop-step {
        fill: #52637A;
        font-size: 10.5px;
        font-weight: 560;
      }

      .loop-caption {
        fill: #6B7A90;
        font-size: 10.5px;
      }

      .flow-pill {
        fill: #FFFFFF;
        stroke-width: 1.4;
      }

      .flow-label {
        fill: #334155;
        font-size: 10px;
        font-weight: 620;
      }

      .flow-dot {
        opacity: 0.9;
      }

      .flow-node-label {
        fill: #1E293B;
        font-size: 10.4px;
        font-weight: 650;
      }

      .icon-line {
        fill: none;
        stroke: #243449;
        stroke-width: 1.35;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .node-icon {
        fill: none;
        stroke: #1E293B;
        stroke-width: 0.75;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.78;
      }

      @media (prefers-reduced-motion: reduce) {
        animate {
          display: none;
        }
      }
    </style>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#grid)"/>
  <rect width="1200" height="300" fill="url(#wash)"/>

  <g filter="url(#shadow)">
    <rect x="48" y="38" width="1104" height="224" rx="24" fill="#FFFFFF" fill-opacity="0.9" stroke="#94A3B8" stroke-opacity="0.22"/>
  </g>

  <g class="display">
    <text class="name" x="78" y="98">Samuel Adebayo</text>
    <text class="primary" x="80" y="134">Applied AI Leader &#183; AI Team Lead @</text>
    <g transform="translate(386 108)">
      <rect x="0" y="0" width="132" height="36" rx="18" fill="#05080D" stroke="#72D0BD" stroke-opacity="0.58" stroke-width="1"/>
      <g transform="translate(8 4)">
        <circle cx="14" cy="14" r="13" fill="url(#isx4Core)"/>
        <path d="M4.3 17.4C9.8 19.3 18.7 16.9 25.7 7.2" stroke="url(#isx4Shade)" stroke-width="3.8" stroke-linecap="round" fill="none"/>
        <path d="M4.8 21.7C13.1 24.6 23.8 19.2 27.8 8.9" stroke="url(#isx4Shade)" stroke-width="3.1" stroke-linecap="round" fill="none" opacity="0.76"/>
        <path d="M8.3 10.1C13.9 12 20.6 9.8 25.4 4.8" stroke="#D9EFCB" stroke-width="2.7" stroke-linecap="round" fill="none" opacity="0.6"/>
      </g>
      <text x="42" y="17.2" fill="#FFFFFF" font-size="15" font-weight="780">ISx4</text>
      <text x="43" y="27.2" fill="#DCE6F3" font-size="5.9" font-weight="720" letter-spacing="1.7">AI &amp; ANALYTICS</text>
    </g>
    <text class="secondary" x="81" y="166">Principal Data Scientist &#183; AI Engineer &#183; ML Researcher</text>
    <text class="secondary-soft" x="81" y="189">Visiting Fellow, Queen&#8217;s University Belfast</text>
    <text class="tagline" x="80" y="219">Building production ML, LLM, agentic, and computer vision systems.</text>
  </g>

  <g class="mono">
    <path d="M80 235H610" stroke="url(#accent)" stroke-width="2" stroke-linecap="round"/>
    <text class="capability" x="80" y="253">AI Engineering / Agentic systems / Evaluation / Observability / MLOps / Applied research</text>
  </g>

  <g class="mono" transform="translate(678 66) scale(1.08)">
    <text class="loop-title" x="0" y="0">Applied AI delivery loop</text>
    <text class="loop-caption" x="0" y="21">AI engineering to agentic systems, with feedback into delivery</text>

    <path d="M24 87H414" stroke="#CBD5E1" stroke-width="1.35" stroke-linecap="round"/>
    <path d="M24 87H414" stroke="url(#loop)" stroke-width="2" stroke-linecap="round" stroke-dasharray="24 390" stroke-dashoffset="390">
      <animate attributeName="stroke-dashoffset" from="390" to="0" dur="6.8s" repeatCount="indefinite"/>
    </path>

    <g>
      <circle cx="24" cy="87" r="8.5" fill="#FFFFFF" stroke="#72D0BD" stroke-width="1.6"/>
      <circle cx="114" cy="87" r="8.5" fill="#FFFFFF" stroke="#8AD0FF" stroke-width="1.6"/>
      <circle cx="210" cy="87" r="8.5" fill="#FFFFFF" stroke="#9BA9FF" stroke-width="1.6"/>
      <circle cx="306" cy="87" r="8.5" fill="#FFFFFF" stroke="#B7A6FF" stroke-width="1.6"/>
      <circle cx="414" cy="87" r="8.5" fill="#FFFFFF" stroke="#D9BE73" stroke-width="1.6"/>

      <g>
        <animate attributeName="opacity" values="0.52;1;0.52" dur="4.8s" repeatCount="indefinite"/>
        <path class="node-icon" d="M21 87L23.4 84.6"/>
        <path class="node-icon" d="M21 87L23.4 89.4"/>
        <path class="node-icon" d="M27.6 84.6L30 87L27.6 89.4"/>
        <path class="node-icon" d="M26 84.8L24 89.2"/>
      </g>
      <g>
        <animate attributeName="opacity" values="0.5;1;0.5" dur="4.8s" begin="0.7s" repeatCount="indefinite"/>
        <path class="node-icon" d="M111.4 85.4L116.6 88.6"/>
        <path class="node-icon" d="M116.6 85.4L111.4 88.6"/>
        <circle cx="111.4" cy="85.4" r="0.75" fill="#1E293B"/>
        <circle cx="116.6" cy="85.4" r="0.75" fill="#1E293B"/>
        <circle cx="114" cy="90.6" r="0.75" fill="#1E293B"/>
      </g>
      <g>
        <animate attributeName="opacity" values="0.5;1;0.5" dur="4.8s" begin="1.4s" repeatCount="indefinite"/>
        <path class="node-icon" d="M206.5 87L209.2 89.7L214 84"/>
      </g>
      <g>
        <animate attributeName="opacity" values="0.5;1;0.5" dur="4.8s" begin="2.1s" repeatCount="indefinite"/>
        <path class="node-icon" d="M301.5 88H304.2L306 84.8L308.2 90.2L310.2 86.4H314.2"/>
      </g>
      <g>
        <animate attributeName="opacity" values="0.5;1;0.5" dur="4.8s" begin="2.8s" repeatCount="indefinite"/>
        <path class="node-icon" d="M414 91V83"/>
        <path class="node-icon" d="M410.8 86.2L414 83L417.2 86.2"/>
        <path class="node-icon" d="M410 91H418"/>
      </g>

      <text class="flow-node-label" x="-10" y="68">AI eng</text>
      <text class="flow-node-label" x="94" y="68">agents</text>
      <text class="flow-node-label" x="184" y="68">evaluate</text>
      <text class="flow-node-label" x="280" y="68">observe</text>
      <text class="flow-node-label" x="394" y="68">deploy</text>
    </g>

    <path d="M414 98C386 134 304 151 219 151" stroke="#CBD5E1" stroke-width="1.25" stroke-linecap="round" fill="none"/>
    <path d="M414 98C386 134 304 151 219 151" stroke="url(#loop)" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="18 230" stroke-dashoffset="230" opacity="0.55" fill="none">
      <animate attributeName="stroke-dashoffset" from="230" to="0" dur="5.2s" begin="0.4s" repeatCount="indefinite"/>
    </path>

    <g>
      <circle cx="219" cy="151" r="8.5" fill="#FFFFFF" stroke="#72D0BD" stroke-width="1.6"/>
      <g>
        <animate attributeName="opacity" values="0.48;1;0.48" dur="4.8s" begin="3.2s" repeatCount="indefinite"/>
        <path class="node-icon" d="M216.4 149.2C218.2 146.8 222.4 147.6 222.4 151"/>
        <path class="node-icon" d="M222.4 151L220.8 148.7"/>
        <path class="node-icon" d="M222.4 151L224.6 149.6"/>
        <path class="node-icon" d="M221.6 152.8C219.8 155.2 215.6 154.4 215.6 151"/>
        <path class="node-icon" d="M215.6 151L217.2 153.3"/>
        <path class="node-icon" d="M215.6 151L213.4 152.4"/>
      </g>
      <text class="flow-node-label" x="150" y="174">production feedback</text>
    </g>

    <path d="M219 151C130 151 54 134 24 98" stroke="#CBD5E1" stroke-width="1.25" stroke-linecap="round" fill="none"/>
    <path d="M219 151C130 151 54 134 24 98" stroke="url(#loop)" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="24 250" stroke-dashoffset="250" opacity="0.5" fill="none">
      <animate attributeName="stroke-dashoffset" from="250" to="0" dur="7.8s" begin="1.4s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
